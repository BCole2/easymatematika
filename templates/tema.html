<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{{ tema }}</title>
</head>
<body>
    <nav><a href="/">🏠 Zpět</a> <span>{{ tema|capitalize }}</span></nav>
    <div class="container">
        <h1>{{ tema|capitalize }} - {{ rocnik }}</h1>
        {% for m in moduly %}
            <div class="card">
                <strong>{{ m.typ|upper }}</strong>
                <p>{{ m.obsah }}</p>
            </div>
        {% endfor %}

        {% if je_editor %}
        <div class="card" style="border-style: dashed;">
            <h3>Přidat obsah</h3>
            <form action="/add_modul" method="POST">
                <input type="hidden" name="rocnik" value="{{ rocnik }}">
                <input type="hidden" name="tema" value="{{ tema }}">
                <select name="typ">
                    <option value="teorie">Teorie</option>
                    <option value="priklad">Příklad</option>
                </select>
                <textarea name="obsah" placeholder="Zadání..." required></textarea>
                <button type="submit">Uložit</button>
            </form>
        </div>
        {% endif %}
    </div>
</body>
</html>
