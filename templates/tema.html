<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{{ tema }}</title>
</head>
<body>
    <nav><a href="/">🏠 Zpět domů</a> <span>{{ tema|capitalize }}</span></nav>
    <div class="container">
        <h1>{{ tema|capitalize }} - {{ rocnik }}</h1>

        {% for m in moduly %}
        <div class="card">
            <small style="color: #888; text-transform: uppercase; font-weight: bold;">{{ m.typ }}</small>
            <p style="font-size: 1.1rem; line-height: 1.6;">{{ m.obsah }}</p>
        </div>
        {% endfor %}

        {% if je_editor %}
        <div class="card" style="border-style: dashed; background: #fafafa;">
            <h3>➕ Přidat nový modul</h3>
            <form action="/add_modul" method="POST">
                <input type="hidden" name="rocnik" value="{{ rocnik }}">
                <input type="hidden" name="tema" value="{{ tema }}">
                <select name="typ">
                    <option value="teorie">Teorie (výklad)</option>
                    <option value="priklad">Příklad k procvičení</option>
                </select>
                <textarea name="obsah" rows="5" placeholder="Sem napiš text učiva nebo zadání příkladu..." required></textarea>
                <button type="submit">Uložit na web</button>
            </form>
        </div>
        {% endif %}
    </div>
</body>
</html>
