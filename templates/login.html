<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Přihlášení</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center;">Přihlášení</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %}{% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="username" placeholder="Uživatelské jméno" required>
                <input type="password" name="password" placeholder="Heslo" required>
                <button type="submit" style="width: 100%;">Přihlásit se</button>
            </form>
            <p style="text-align: center; margin-top: 15px;"><a href="/register">Ještě nemáš účet?</a></p>
        </div>
    </div>
</body>
</html>
