<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení učitele</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h2>Přihlášení do administrace webu</h2>
    
    {% if chyba %}
        <p style="color: red;">{{ chyba }}</p>
    {% endif %}

    <form method="POST">
        <label>Přihlašovací jméno:</label><br>
        <input type="text" name="jmeno" required><br><br>
        
        <label>Heslo:</label><br>
        <input type="password" name="heslo" required><br><br>
        
        <button type="submit" style="padding: 5px 15px;">Přihlásit se</button>
    </form>
    
    <br>
    <a href="/">← Zpět na web</a>

</body>
</html>
