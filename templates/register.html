<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Registrace</title>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center;">Vytvořit účet</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Uživatelské jméno" required>
                <input type="password" name="password" placeholder="Heslo" required>
                <select name="role">
                    <option value="zak">Jsem Žák</option>
                    <option value="ucitel">Jsem Učitel / Admin</option>
                </select>
                <button type="submit" style="width: 100%;">Zaregistrovat</button>
            </form>
            <p style="text-align: center; margin-top: 15px;"><a href="/login">Už mám účet</a></p>
        </div>
    </div>
</body>
</html>
